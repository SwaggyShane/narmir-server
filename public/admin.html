<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Narmir Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0e14;--bg2:#13141d;--bg3:#1a1c27;--bg4:#212432;
  --border:#2a2d3e;--border2:#363a52;
  --text:#e8e9f0;--text2:#9a9bb5;--text3:#5e6080;
  --gold:#e8b84b;--purple:#7c6af5;--green:#4caf7d;
  --red:#e05c5c;--blue:#5b9cf5;--amber:#f0a832;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;padding:24px}
h1{font-size:22px;font-weight:700;color:var(--gold);margin-bottom:4px}
h2{font-size:15px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin:24px 0 12px}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.badge-red{background:rgba(224,92,92,.15);color:var(--red)}
.badge-green{background:rgba(76,175,125,.15);color:var(--green)}
.badge-gold{background:rgba(232,184,75,.15);color:var(--gold)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:16px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.stat .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat .val{font-size:24px;font-weight:700;color:var(--gold)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.btn{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn:hover{background:var(--bg4);border-color:var(--purple)}
.btn:active{transform:scale(.97)}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-red:hover{background:rgba(224,92,92,.1)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-green:hover{background:rgba(76,175,125,.1)}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#0d0e14;font-weight:700}
.btn-gold:hover{opacity:.9}
input[type=text],input[type=number],input[type=password],textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);padding:7px 10px;font-size:13px;outline:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:var(--purple)}
textarea{width:100%;resize:vertical;min-height:60px}
.announce-row{display:flex;gap:8px;align-items:flex-start}
.announce-row textarea{flex:1}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-lg);color:var(--text);font-size:13px;padding:10px 18px;opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px 28px;width:100%;max-width:420px}
.modal.wide{max-width:720px}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-btns{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.sec-label{grid-column:1/-1;font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.6px;padding:10px 0 2px;border-bottom:1px solid var(--border);margin-bottom:2px}
#auth-screen{max-width:360px;margin:80px auto}
</style>
</head>
<body>

<div id="auth-screen" class="card" style="display:none">
  <h1 style="margin-bottom:4px">NARMIR</h1>
  <div style="color:var(--text2);font-size:13px;margin-bottom:20px">Admin panel</div>
  <div id="auth-err" style="color:var(--red);font-size:13px;margin-bottom:10px;min-height:16px"></div>
  <input type="text" id="a-user" placeholder="Username" style="width:100%;margin-bottom:10px">
  <input type="password" id="a-pass" placeholder="Password" style="width:100%;margin-bottom:14px">
  <button class="btn btn-gold" style="width:100%;padding:9px" onclick="adminLogin()">Login</button>
</div>

<div id="main-screen" style="display:none">
  <div class="topbar">
    <div>
      <h1>Narmir Admin</h1>
      <div style="font-size:12px;color:var(--text3);margin-top:2px">Logged in as <span id="admin-user" style="color:var(--text2)"></span></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn" onclick="loadData()">Refresh</button>
      <button class="btn btn-red" onclick="adminLogout()">Logout</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat"><div class="lbl">Players</div><div class="val" id="st-players">—</div></div>
    <div class="stat"><div class="lbl">Kingdoms</div><div class="val" id="st-kingdoms">—</div></div>
    <div class="stat"><div class="lbl">Banned</div><div class="val" id="st-banned" style="color:var(--red)">—</div></div>
    <div class="stat"><div class="lbl">Combats</div><div class="val" id="st-combats">—</div></div>
    <div class="stat"><div class="lbl">Messages</div><div class="val" id="st-messages">—</div></div>
    <div class="stat"><div class="lbl">Last regen</div><div class="val" style="font-size:14px" id="st-regen">—</div></div>
  </div>

  <div class="card">
    <h2 style="margin-top:0">Global announcement</h2>
    <div class="announce-row">
      <textarea id="announce-msg" placeholder="Message to broadcast to all players..."></textarea>
      <button class="btn btn-gold" onclick="sendAnnouncement()" style="padding:9px 16px">Send</button>
    </div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
    <h2 style="margin:0;flex:1">Kingdoms</h2>
    <input type="text" id="search-input" placeholder="Search by name or username..." style="width:220px" oninput="filterTable(this.value)">
    <button class="btn btn-green" onclick="resetAllTurns()">Reset all turns to 200</button>
  </div>

  <div style="overflow-x:auto">
    <table>
      <thead>
        <tr>
          <th>Kingdom</th><th>Username</th><th>Race</th>
          <th>Land</th><th>Gold</th><th>Turns</th><th>Status</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="kingdom-table"></tbody>
    </table>
  </div>
</div>

<!-- Ban modal -->
<div class="modal-overlay" id="ban-modal">
  <div class="modal">
    <h3>Ban player</h3>
    <input type="text" id="ban-reason" placeholder="Ban reason (optional)" style="width:100%;margin-bottom:10px">
    <div style="font-size:12px;color:var(--text3)">Player: <span id="ban-name" style="color:var(--text)"></span></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeBanModal()">Cancel</button>
      <button class="btn btn-red" onclick="confirmBan()">Ban player</button>
    </div>
  </div>
</div>

<!-- Edit kingdom modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal wide">
    <h3>Edit Kingdom — <span id="edit-kname" style="color:var(--gold)"></span></h3>
    <div id="edit-fields" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 14px;max-height:60vh;overflow-y:auto;padding-right:6px"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-gold" onclick="confirmEdit()">Save all changes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var allKingdoms = [];
var banTarget   = null;
var editTarget  = null;

var EDIT_SECTIONS = [
  { label:'Resources', fields:[
    {key:'gold',label:'Gold'},{key:'mana',label:'Mana'},{key:'land',label:'Land'},
    {key:'population',label:'Population'},{key:'food',label:'Food'},{key:'morale',label:'Morale'},
    {key:'turn',label:'Turn #'},{key:'turns_stored',label:'Turns stored'},
    {key:'xp',label:'XP'},{key:'level',label:'Level'},
  ]},
  { label:'Units', fields:[
    {key:'fighters',label:'Fighters'},{key:'rangers',label:'Rangers'},{key:'clerics',label:'Clerics'},
    {key:'mages',label:'Mages'},{key:'thieves',label:'Thieves'},{key:'ninjas',label:'Ninjas'},
    {key:'researchers',label:'Researchers'},{key:'engineers',label:'Engineers'},
    {key:'war_machines',label:'War machines'},{key:'weapons_stockpile',label:'Weapons stockpile'},
    {key:'armor_stockpile',label:'Armor stockpile'},
  ]},
  { label:'Buildings', fields:[
    {key:'bld_farms',label:'Farms'},{key:'bld_barracks',label:'Barracks'},{key:'bld_outposts',label:'Outposts'},
    {key:'bld_guard_towers',label:'Guard towers'},{key:'bld_schools',label:'Schools'},
    {key:'bld_armories',label:'Armories'},{key:'bld_vaults',label:'Vaults'},
    {key:'bld_smithies',label:'Smithies'},{key:'bld_markets',label:'Markets'},
    {key:'bld_cathedrals',label:'Cathedrals'},{key:'bld_training',label:'Training fields'},
    {key:'bld_colosseums',label:'Taverns'},{key:'bld_castles',label:'Castles'},
  ]},
  { label:'Research', fields:[
    {key:'res_economy',label:'Economy'},{key:'res_weapons',label:'Weapons'},
    {key:'res_armor',label:'Armor'},{key:'res_military',label:'Military'},
    {key:'res_attack_magic',label:'Attack magic'},{key:'res_defense_magic',label:'Defense magic'},
    {key:'res_entertainment',label:'Entertainment'},{key:'res_construction',label:'Construction'},
    {key:'res_war_machines',label:'War machines'},{key:'res_spellbook',label:'Spellbook'},
  ]},
];

function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast '+(type||''); el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2800);
}

async function api(method, path, body) {
  try {
    var res = await fetch(path, {
      method: method, headers: {'Content-Type':'application/json'}, credentials: 'include',
      body: body ? JSON.stringify(body) : undefined,
    });
    var text = await res.text();
    try { return JSON.parse(text); } catch { return {error: text.slice(0,200)}; }
  } catch(e) { return {error: e.message}; }
}

async function adminLogin() {
  var u = document.getElementById('a-user').value.trim();
  var p = document.getElementById('a-pass').value;
  var err = document.getElementById('auth-err');
  if (!u||!p) { err.textContent='Username and password required'; return; }
  var r = await api('POST','/api/auth/login',{username:u,password:p});
  if (r.error) { err.textContent=r.error; return; }
  if (!r.isAdmin) { err.textContent='Not an admin account'; return; }
  document.getElementById('admin-user').textContent = u;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  loadData();
}

function adminLogout() {
  api('POST','/api/auth/logout');
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'block';
}

async function loadData() {
  var stats = await api('GET','/api/admin/stats');
  if (stats.error) { toast('Stats error: '+stats.error,'error'); return; }
  document.getElementById('st-players').textContent  = stats.players;
  document.getElementById('st-kingdoms').textContent = stats.kingdoms;
  document.getElementById('st-banned').textContent   = stats.banned;
  document.getElementById('st-combats').textContent  = stats.combats;
  document.getElementById('st-messages').textContent = stats.messages;
  document.getElementById('st-regen').textContent = stats.lastRegen
    ? new Date(stats.lastRegen*1000).toLocaleTimeString() : '—';
  var kingdoms = await api('GET','/api/admin/kingdoms');
  if (kingdoms.error) { toast('Kingdoms error: '+kingdoms.error,'error'); return; }
  allKingdoms = kingdoms;
  renderTable(kingdoms);
}

function renderTable(rows) {
  var tbody = document.getElementById('kingdom-table');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="color:var(--text3);text-align:center;padding:20px">No kingdoms found</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(function(k) {
    var banned = k.is_banned
      ? '<span class="badge badge-red">Banned</span>'
      : '<span class="badge badge-green">Active</span>';
    var admin = k.is_admin ? ' <span class="badge badge-gold">Admin</span>' : '';
    var kData = encodeURIComponent(JSON.stringify(k));
    return '<tr>'
      +'<td style="color:var(--text);font-weight:500">'+k.name+'</td>'
      +'<td>'+k.username+admin+'</td>'
      +'<td style="color:var(--text3)">'+k.race.replace(/_/g,' ')+'</td>'
      +'<td>'+(k.land||0).toLocaleString()+'</td>'
      +'<td style="color:var(--gold)">'+(k.gold||0).toLocaleString()+'</td>'
      +'<td>'+(k.turns_stored||0)+'/200</td>'
      +'<td>'+banned+'</td>'
      +'<td style="display:flex;gap:5px;flex-wrap:wrap">'
      +'<button class="btn btn-gold" onclick="openEditModal(\''+kData+'\')">Edit</button>'
      +'<button class="btn" onclick="resetTurns('+k.id+',\''+escQ(k.name)+'\')">+Turns</button>'
      +(k.is_banned
        ? '<button class="btn btn-green" onclick="unban('+k.player_id+',\''+escQ(k.username)+'\')">Unban</button>'
        : '<button class="btn btn-red" onclick="openBanModal('+k.player_id+',\''+escQ(k.username)+'\')">Ban</button>')
      +'</td></tr>';
  }).join('');
}

function escQ(s) { return String(s).replace(/'/g,"&#39;"); }

function filterTable(q) {
  renderTable(allKingdoms.filter(function(k){
    return k.name.toLowerCase().includes(q.toLowerCase())
        || k.username.toLowerCase().includes(q.toLowerCase());
  }));
}

function openEditModal(kData) {
  var k = JSON.parse(decodeURIComponent(kData));
  editTarget = k.id;
  document.getElementById('edit-kname').textContent = k.name + ' (' + k.username + ')';
  var html = '';
  EDIT_SECTIONS.forEach(function(sec) {
    html += '<div class="sec-label">'+sec.label+'</div>';
    sec.fields.forEach(function(f) {
      var val = (k[f.key] !== undefined && k[f.key] !== null) ? k[f.key] : 0;
      html += '<div style="display:flex;flex-direction:column;gap:3px">'
        +'<label style="font-size:11px;color:var(--text3)">'+f.label+'</label>'
        +'<input type="number" id="ef-'+f.key+'" value="'+Number(val)+'" style="width:100%">'
        +'</div>';
    });
  });
  document.getElementById('edit-fields').innerHTML = html;
  document.getElementById('edit-modal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editTarget = null;
}

async function confirmEdit() {
  var fields = {};
  EDIT_SECTIONS.forEach(function(sec) {
    sec.fields.forEach(function(f) {
      var el = document.getElementById('ef-'+f.key);
      if (el && el.value !== '') fields[f.key] = el.value;
    });
  });
  var r = await api('POST','/api/admin/set-kingdom',{kingdomId:editTarget, fields:fields});
  if (r.error) return toast(r.error,'error');
  toast('Saved: '+r.updated.join(', '),'success');
  closeEditModal(); loadData();
}

async function resetTurns(kingdomId, name) {
  var r = await api('POST','/api/admin/reset-turns',{kingdomId:kingdomId});
  if (r.error) return toast(r.error,'error');
  toast('Turns reset for '+name,'success'); loadData();
}

async function resetAllTurns() {
  if (!confirm('Reset ALL kingdoms to 200 turns?')) return;
  var r = await api('POST','/api/admin/reset-turns-all');
  if (r.error) return toast(r.error,'error');
  toast('All turns reset to 200','success'); loadData();
}

function openBanModal(playerId, username) {
  banTarget = playerId;
  document.getElementById('ban-name').textContent = username;
  document.getElementById('ban-reason').value = '';
  document.getElementById('ban-modal').classList.add('open');
}
function closeBanModal() { document.getElementById('ban-modal').classList.remove('open'); banTarget=null; }

async function confirmBan() {
  var reason = document.getElementById('ban-reason').value.trim();
  var r = await api('POST','/api/admin/ban',{playerId:banTarget,reason:reason});
  if (r.error) return toast(r.error,'error');
  toast('Player banned','success'); closeBanModal(); loadData();
}

async function unban(playerId, username) {
  var r = await api('POST','/api/admin/unban',{playerId:playerId});
  if (r.error) return toast(r.error,'error');
  toast(username+' unbanned','success'); loadData();
}

async function sendAnnouncement() {
  var msg = document.getElementById('announce-msg').value.trim();
  if (!msg) return toast('Enter a message','error');
  var r = await api('POST','/api/admin/announce',{message:msg});
  if (r.error) return toast(r.error,'error');
  toast('Announcement sent','success');
  document.getElementById('announce-msg').value = '';
}

api('GET','/api/auth/me').then(function(me) {
  if (me.error || !me.isAdmin) {
    document.getElementById('auth-screen').style.display = 'block';
  } else {
    document.getElementById('admin-user').textContent = me.username;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    loadData();
  }
});
</script>
</body>
</html>
